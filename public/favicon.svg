<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c960"/>
      <stop offset="50%" style="stop-color:#d4a934"/>
      <stop offset="100%" style="stop-color:#845414"/>
    </linearGradient>
    <linearGradient id="runeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1b1c35"/>
      <stop offset="100%" style="stop-color:#0f0f1f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shield background -->
  <circle cx="32" cy="32" r="30" fill="url(#runeGrad)" stroke="url(#shieldGrad)" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#shieldGrad)" stroke-width="0.8" opacity="0.4"/>
  <!-- Rune glow -->
  <text x="32" y="42" text-anchor="middle" font-family="serif" font-size="28" fill="url(#shieldGrad)" filter="url(#glow)">ᚦ</text>
  <!-- Ping rings -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#d4a934" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" from="27" to="32" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>