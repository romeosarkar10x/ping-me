name: Deploy to 'Github Pages'

on:
    workflow_call:

jobs:
    deploy_to_gh_pages:
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        steps:
            - name: Deploy to 'Github Pages'
              id: deploy
              uses: actions/deploy-pages@v4

            - name: Echo deployment URL
              run: "echo URL: ${{ steps.deploy.outputs.page_url }}"
