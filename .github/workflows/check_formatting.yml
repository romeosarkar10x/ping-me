name: Check formatting

on:
    workflow_call:

jobs:
    check_formatting:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up 'node'
              uses: actions/setup-node@v6
              with:
                  node-version: latest

            - name: Set up 'pnpm'
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - name: Install dependencies
              run: pnpm install

            - name: Check formatting
              run: pnpm run format:check
