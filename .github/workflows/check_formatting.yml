name: Check formatting

on:
    workflow_call:

jobs:
    check_formatting:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up 'bun'
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Check formatting
              run: bun run format:check
