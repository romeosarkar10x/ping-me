name: Type check

on:
    workflow_call:

jobs:
    type_check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up 'bun'
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Type check
              run: bun run type-check
