name: Type check

on:
    workflow_call:

jobs:
    type_check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up 'node'
              uses: actions/setup-node@v6

            - name: Set up 'pnpm'
              uses: pnpm/action-setup@v6

            - name: Install dependencies
              run: pnpm install

            - name: Type check
              run: pnpm run type-check
