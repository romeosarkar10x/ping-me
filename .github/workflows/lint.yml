name: Lint

on:
    workflow_call:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up 'node'
              uses: actions/setup-node@v6

            - name: Set up 'pnpm'
              uses: pnpm/action-setup

            - name: Install dependencies
              run: pnpm install

            - name: Lint
              run: pnpm run lint
